{% extends "base.html" %} {% block content %}
<h2>Extract Hidden Message</h2>

<form method="POST" enctype="multipart/form-data">
  <label>Upload Stego File</label>
  <input type="file" name="stego_file" class="form-control mb-3" required />

  <label>Starting Bit (S)</label>
  <input type="number" name="start_bit" class="form-control mb-3" value="128" />

  <label>Interval (L)</label>
  <input type="number" name="interval_l" class="form-control mb-3" value="8" />

  <label>Mode (C)</label>
  <select name="mode" class="form-control mb-3">
    <option value="fixed">Fixed</option>
    <option value="alternate">Alternate</option>
    <option value="increasing">Increasing</option>
  </select>

  <button class="btn btn-primary">Extract</button>
</form>

{% if extracted_text %}
<hr />
<h4>Recovered Message:</h4>
<div class="alert alert-success">{{ extracted_text }}</div>
{% endif %} {% endblock %}
