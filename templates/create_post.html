{% extends "base.html" %} {% block content %}
<h2>Create Stego File</h2>

<form method="POST" enctype="multipart/form-data">
  <label>Carrier File</label>
  <input type="file" name="carrier_file" class="form-control mb-3" required />

  <label>Secret Message</label>
  <textarea name="secret_text" class="form-control mb-3"></textarea>

  <label>Starting Bit (S)</label>
  <input type="number" name="start_bit" class="form-control mb-3" value="128" />

  <label>Interval (L)</label>
  <input type="number" name="interval_l" class="form-control mb-3" value="8" />

  <label>Mode (C)</label>
  <select name="mode" class="form-control mb-3">
    <option value="fixed">Fixed</option>
    <option value="alternate">Alternate</option>
    <option value="increasing">Increasing</option>
  </select>

  <button class="btn btn-primary">Create Stego</button>
</form>

{% endblock %}
